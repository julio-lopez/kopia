  analyze-actions:
    name: Analyze Actions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
    steps:
    -
      uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
      with:
        egress-policy: audit
    -
      name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    -
      name: Initialize CodeQL
      uses: github/codeql-action/init@0b7b740d4cd9b44f80c907b666497564df09d1d9 # v2.23.3
      with:
        languages: actions
        # Custom queries can be specified here or in a config file.
        # By default, queries listed here will override any specified in a config file.
        # Prefix the list here with "+" to use these queries and those in the config file.
        # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
        queries: security-extended,security-and-quality
    -
      name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@0b7b740d4cd9b44f80c907b666497564df09d1d9 # v2.23.3
      with:
        category: "/language:actions"

  analyze-go:
    name: Analyze Go
    # Runner size impacts CodeQL analysis time. To learn more, please see:
    #   - https://gh.io/recommended-hardware-resources-for-running-codeql
    #   - https://gh.io/supported-runners-and-hardware-resources
    #   - https://gh.io/using-larger-runners
    # Consider using larger runners for possible analysis time improvements.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
    steps:
    -
      uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
      with:
        egress-policy: audit
    -
      name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    -
      name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        cache: true
        check-latest: true
        go-version-file: 'go.mod'
    -
      name: Initialize CodeQL
      uses: github/codeql-action/init@0b7b740d4cd9b44f80c907b666497564df09d1d9 # v2.23.3
      with:
        build-mode: manual
        languages: 'go'
        # Custom queries can be specified here or in a config file.
        # By default, queries listed here will override any specified in a config file.
        # Prefix the list here with "+" to use these queries and those in the config file.
        # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
        queries: security-extended,security-and-quality
    -
      name: Build
      run: |
        go build ./...
        go test -list '.*' ./...
    -
      name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@0b7b740d4cd9b44f80c907b666497564df09d1d9 # v2.23.3
      with:
        category: "/language:go"
